services:
  # --- Database (PostgreSQL + pgvector) ---
  db:
    image: pgvector/pgvector:pg16
    container_name: pdf_rag_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_COLLECTION_NAME:-vector_db}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DATABASE_COLLECTION_NAME:-vector_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend API (FastAPI + LangGraph) ---
  api:
    build: .
    container_name: pdf_rag_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DATABASE_PASSWORD:-postgres_pass}@db:5432/${DATABASE_COLLECTION_NAME:-vector_db}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE}
      - LLM_EMBEDDING_PROVIDER=${LLM_EMBEDDING_PROVIDER}
      - LLM_EMBEDDING_MODEL=${LLM_EMBEDDING_MODEL}
      - NO_PROXY=host.docker.internal,localhost,127.0.0.1
      - no_proxy=host.docker.internal,localhost,127.0.0.1
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000

  # --- Frontend (Streamlit) ---
  ui:
    build: .
    container_name: pdf_rag_ui
    depends_on:
      - api
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    command: uv run streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data: